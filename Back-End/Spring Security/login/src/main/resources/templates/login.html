<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
<form method="post" th:action="@{/login}">
  <h2>Login</h2>
  <p>
    <label for="email">Email</label>
    <input type="email" id="email" th:name="username" placeholder="Email" required autofocus>
  </p>
  <p>
    <label for="password">Password</label>
    <input type="password" id="password" th:name="password" placeholder="Password" required autofocus>
  </p>
  <button type="submit">Login</button>
</form>
</body>
</html>
